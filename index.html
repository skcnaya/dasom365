<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>365 안심돌봄 v15</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; letter-spacing: -0.03em; -webkit-tap-highlight-color: transparent; }
        .btn-gradient { background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%); }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.04); }
        .loading-spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-[#F8FAFC]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ★★★ 여기에 복사한 구글 배포 URL을 넣으세요 ★★★
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyEgpR6_vuxAhCzG3ToKD0XHoOhIEJFYbbFlFN0V3BjcT1o7swYTJI4muVP0RiomEsg/exec";

        function App() {
            const [staffs, setStaffs] = useState(() => JSON.parse(localStorage.getItem('staffs')) || []);
            const [workers, setWorkers] = useState(() => JSON.parse(localStorage.getItem('workers')) || []);
            const [elders, setElders] = useState(() => JSON.parse(localStorage.getItem('elders')) || []);
            const [logs, setLogs] = useState(() => JSON.parse(localStorage.getItem('logs')) || []);
            const [activeTab, setActiveTab] = useState('home');
            const [isSyncing, setIsSyncing] = useState(false);
            const [toast, setToast] = useState({ show: false, msg: '' });

            useEffect(() => {
                localStorage.setItem('staffs', JSON.stringify(staffs));
                localStorage.setItem('workers', JSON.stringify(workers));
                localStorage.setItem('elders', JSON.stringify(elders));
                localStorage.setItem('logs', JSON.stringify(logs));
            }, [staffs, workers, elders, logs]);

            const showToast = (msg) => {
                setToast({ show: true, msg });
                setTimeout(() => setToast({ show: false }), 2000);
            };

            const syncData = async () => {
                if (!GOOGLE_SCRIPT_URL.startsWith("http")) return alert("URL을 먼저 설정해주세요.");
                setIsSyncing(true);
                try {
                    const res = await fetch(`${GOOGLE_SCRIPT_URL}?action=getData`);
                    const json = await res.json();
                    if (json.status === 'success') {
                        setStaffs(json.data.staffs);
                        setWorkers(json.data.workers);
                        setElders(json.data.elders);
                        showToast("동기화 완료!");
                    }
                } catch (e) { showToast("연결 실패"); }
                finally { setIsSyncing(false); }
            };

            const saveLog = async (e) => {
                e.preventDefault();
                const fd = new FormData(e.target);
                const data = {
                    sheetName: 'logs',
                    type: fd.get('type'),
                    date: fd.get('date'),
                    targetName: fd.get('targetName'),
                    provider: fd.get('provider'),
                    destination: fd.get('destination'),
                    purpose: fd.get('purpose'),
                    dist: Number(fd.get('end')) - Number(fd.get('start')),
                    isError: false
                };
                setLogs([data, ...logs]);
                fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
                showToast("기록 완료");
                setActiveTab('home');
            };

            const markError = (idx) => {
                if (!confirm("오류로 기록할까요?")) return;
                const newLogs = [...logs];
                newLogs[idx].isError = true;
                newLogs[idx].purpose = "[입력오류] " + newLogs[idx].purpose;
                setLogs(newLogs);
                fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({...newLogs[idx], sheetName:'logs'}) });
                showToast("오류 처리됨");
            };

            return (
                <div className="max-w-md mx-auto min-h-screen relative pb-24">
                    {/* Header */}
                    <div className="p-6 flex justify-between items-center">
                        <div>
                            <h1 className="text-2xl font-black text-slate-900 tracking-tighter">365 안심돌봄</h1>
                            <p className="text-[10px] text-blue-600 font-bold uppercase tracking-widest">Premium v15</p>
                        </div>
                        <button onClick={syncData} className={`w-10 h-10 rounded-xl bg-white shadow-sm flex items-center justify-center ${isSyncing ? 'text-blue-500' : 'text-slate-400'}`}>
                            <i className={`fas fa-sync-alt ${isSyncing ? 'loading-spin' : ''}`}></i>
                        </button>
                    </div>

                    {activeTab === 'home' && (
                        <div className="p-6 space-y-4">
                            <h2 className="text-sm font-black text-slate-800">최근 기록</h2>
                            {logs.map((l, i) => (
                                <div key={i} className={`bg-white p-5 rounded-[2rem] card-shadow border border-white ${l.isError ? 'opacity-40 grayscale' : ''}`}>
                                    <div className="flex justify-between items-start">
                                        <div>
                                            <p className="font-bold text-slate-800">{l.targetName} <span className="text-[10px] text-slate-400">{l.type}</span></p>
                                            <p className="text-[10px] text-slate-400">{l.date} · {l.provider}</p>
                                            <p className="text-xs mt-2 text-slate-600">{l.destination}</p>
                                        </div>
                                        <div className="text-right">
                                            <p className="text-xs font-black text-blue-600">+{l.dist}km</p>
                                            {!l.isError && <button onClick={()=>markError(i)} className="text-[10px] text-rose-400 mt-4 underline">오류신고</button>}
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}

                    {activeTab === 'record' && (
                        <div className="p-6">
                            <form onSubmit={saveLog} className="space-y-4">
                                <div className="bg-white p-6 rounded-[2.5rem] card-shadow space-y-4">
                                    <select name="type" className="w-full p-4 bg-slate-50 rounded-2xl font-bold border-none appearance-none">
                                        <option value="병원동행">병원 동행</option>
                                        <option value="인력이동">인력 이동</option>
                                    </select>
                                    <select name="provider" required className="w-full p-4 bg-slate-50 rounded-2xl font-bold border-none appearance-none">
                                        <option value="">수행 인력 선택</option>
                                        {staffs.map((s,i)=><option key={i} value={s.name}>{s.name} ({s.role})</option>)}
                                    </select>
                                    <select name="targetName" required className="w-full p-4 bg-slate-50 rounded-2xl font-bold text-blue-600 border-none appearance-none">
                                        <option value="">대상자 선택</option>
                                        {[...elders, ...workers].map((e,i)=><option key={i} value={e.name}>{e.name}</option>)}
                                    </select>
                                    <input type="date" name="date" required className="w-full p-4 bg-slate-50 rounded-2xl font-bold border-none" />
                                    <input name="destination" placeholder="목적지 (병원/가정 등)" required className="w-full p-4 bg-slate-50 rounded-2xl font-bold border-none" />
                                    <input name="purpose" placeholder="비고/특이사항" className="w-full p-4 bg-slate-50 rounded-2xl border-none" />
                                </div>
                                <div className="bg-slate-900 p-6 rounded-[2.5rem] grid grid-cols-2 gap-4">
                                    <input type="number" name="start" placeholder="출발(km)" required className="bg-slate-800 text-white p-4 rounded-xl border-none font-bold" />
                                    <input type="number" name="end" placeholder="도착(km)" required className="bg-slate-800 text-white p-4 rounded-xl border-none font-bold" />
                                </div>
                                <button type="submit" className="w-full btn-gradient text-white py-5 rounded-[2rem] font-black text-lg shadow-lg shadow-blue-200">기록 저장</button>
                            </form>
                        </div>
                    )}

                    {activeTab === 'manage' && (
                        <div className="p-6 space-y-4">
                            <h2 className="text-xl font-black">인원 관리</h2>
                            <p className="text-xs text-slate-400">데이터가 비어있다면 우측 상단 동기화 버튼을 누르세요.</p>
                            {['staffs','workers','elders'].map(cat => (
                                <div key={cat} className="space-y-2">
                                    <p className="text-[10px] font-black text-blue-500 uppercase mt-4">{cat}</p>
                                    {(cat==='staffs'?staffs:cat==='workers'?workers:elders).map((p,i)=>(
                                        <div key={i} className="bg-white p-4 rounded-2xl shadow-sm flex justify-between items-center">
                                            <span className="font-bold">{p.name}</span>
                                            <a href={`tel:${p.phone}`} className="text-emerald-500"><i className="fas fa-phone-alt"></i></a>
                                        </div>
                                    ))}
                                </div>
                            ))}
                        </div>
                    )}

                    {/* Bottom Nav */}
                    <nav className="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-md border-t flex justify-around p-4 rounded-t-[2rem]">
                        <button onClick={()=>setActiveTab('home')} className={activeTab==='home'?'text-blue-600':'text-slate-300'}><i className="fas fa-home text-xl"></i></button>
                        <button onClick={()=>setActiveTab('record')} className="bg-blue-600 text-white w-12 h-12 rounded-2xl flex items-center justify-center -translate-y-8 shadow-lg shadow-blue-200"><i className="fas fa-plus"></i></button>
                        <button onClick={()=>setActiveTab('manage')} className={activeTab==='manage'?'text-blue-600':'text-slate-300'}><i className="fas fa-users text-xl"></i></button>
                    </nav>

                    {toast.show && <div className="fixed bottom-24 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-6 py-2 rounded-full text-xs font-bold z-50 animate-bounce">{toast.msg}</div>}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
