<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>365 안심돌봄 Premium v15</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; letter-spacing: -0.03em; }
        .glass-header { background: rgba(248, 250, 252, 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.04), 0 8px 10px -6px rgba(0, 0, 0, 0.04); }
        .btn-gradient { background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%); }
        input:focus, select:focus { background-color: #ffffff !important; box-shadow: inset 0 0 0 2px #2563eb; outline: none; }
        .loading-spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-[#F8FAFC] text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ★★★ 본인의 구글 웹 앱 URL을 반드시 입력하세요 ★★★
        const GOOGLE_SCRIPT_URL = "https://docs.google.com/spreadsheets/d/1uw8HUwsOTN1ZVZko74UbAz1fF-hORCEGBoqjPvq7UOs/edit?usp=drive_link";

        function CareSystemV15() {
            const [staffs, setStaffs] = useState(() => JSON.parse(localStorage.getItem('d15_staffs')) || []);
            const [workers, setWorkers] = useState(() => JSON.parse(localStorage.getItem('d15_workers')) || []);
            const [elders, setElders] = useState(() => JSON.parse(localStorage.getItem('d15_elders')) || []);
            const [logs, setLogs] = useState(() => JSON.parse(localStorage.getItem('d15_logs')) || []);
            const [activeTab, setActiveTab] = useState('home');
            const [toast, setToast] = useState({ show: false, msg: '' });
            const [isSyncing, setIsSyncing] = useState(false);

            useEffect(() => {
                localStorage.setItem('d15_staffs', JSON.stringify(staffs));
                localStorage.setItem('d15_workers', JSON.stringify(workers));
                localStorage.setItem('d15_elders', JSON.stringify(elders));
                localStorage.setItem('d15_logs', JSON.stringify(logs));
            }, [staffs, workers, elders, logs]);

            const showToast = (msg) => {
                setToast({ show: true, msg });
                setTimeout(() => setToast({ show: false }), 2500);
            };

            // 데이터 전송 (POST)
            const syncToGoogle = async (data) => {
                if (!GOOGLE_SCRIPT_URL || GOOGLE_SCRIPT_URL.includes("URL을_입력")) return;
                setIsSyncing(true);
                try {
                    await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
                } catch (e) { console.error(e); }
                finally { setIsSyncing(false); }
            };

            // 데이터 불러오기 (GET)
            const fetchDataFromGoogle = async () => {
                if (!GOOGLE_SCRIPT_URL || GOOGLE_SCRIPT_URL.includes("URL을_입력")) {
                    alert("구글 스크립트 URL이 설정되지 않았습니다.");
                    return;
                }
                setIsSyncing(true);
                showToast("데이터를 동기화 중입니다...");
                try {
                    // GAS의 doGet() 함수를 호출 (URL 뒤에 ?action=getData 추가)
                    const response = await fetch(`${GOOGLE_SCRIPT_URL}?action=getData`);
                    const result = await response.json();
                    
                    if (result.status === 'success') {
                        setStaffs(result.data.staffs || []);
                        setWorkers(result.data.workers || []);
                        setElders(result.data.elders || []);
                        showToast("동기화 완료!");
                    }
                } catch (e) {
                    console.error(e);
                    showToast("동기화 실패. 인터넷 연결을 확인하세요.");
                } finally {
                    setIsSyncing(false);
                }
            };

            const markAsError = async (index) => {
                if(!confirm("이 기록을 '입력오류'로 처리할까요?")) return;
                const updatedLogs = [...logs];
                updatedLogs[index].purpose = "[입력오류] " + (updatedLogs[index].purpose || "");
                updatedLogs[index].isError = true;
                setLogs(updatedLogs);
                await syncToGoogle({ ...updatedLogs[index], sheetName: 'logs', type: '입력오류' });
                showToast("오류 처리 완료");
            };

            const Home = () => (
                <div className="p-6 pb-36 animate-in fade-in duration-500">
                    <header className="flex justify-between items-end mb-8">
                        <div>
                            <p className="text-blue-600 font-black text-xs uppercase tracking-[0.2em] mb-1">Jeongeup Dasom</p>
                            <h2 className="text-3xl font-black tracking-tighter text-slate-900">365 안심돌봄</h2>
                        </div>
                        <button onClick={fetchDataFromGoogle} className={`w-10 h-10 rounded-2xl flex items-center justify-center bg-white card-shadow ${isSyncing ? 'text-blue-500' : 'text-slate-400'}`}>
                            <i className={`fas fa-sync-alt ${isSyncing ? 'loading-spin' : ''}`}></i>
                        </button>
                    </header>
                    <div className="space-y-4">
                        <h3 className="text-sm font-black text-slate-800 px-2">최근 활동 로그</h3>
                        {logs.slice(0, 10).map((l, i) => (
                            <div key={i} className={`bg-white p-5 rounded-[2rem] border card-shadow flex flex-col gap-3 ${l.isError ? 'opacity-50 grayscale' : 'border-white'}`}>
                                <div className="flex justify-between items-start">
                                    <div className="flex items-center gap-3">
                                        <div className={`w-10 h-10 rounded-2xl flex items-center justify-center text-xs ${l.isError ? 'bg-slate-100 text-slate-400' : l.type==='병원'?'bg-blue-100 text-blue-600':'bg-slate-100 text-slate-600'}`}>
                                            <i className={`fas ${l.isError ? 'fa-exclamation-triangle' : l.type==='병원'?'fa-hospital':'fa-car'}`}></i>
                                        </div>
                                        <div>
                                            <p className="text-sm font-bold text-slate-800">{l.targetName} {l.isError && <span className="text-rose-500 text-[10px]">[오류]</span>}</p>
                                            <p className="text-[10px] text-slate-400 font-medium">{l.date} · {l.provider}</p>
                                        </div>
                                    </div>
                                    <p className="text-xs font-black text-slate-600">+{l.dist}km</p>
                                </div>
                                {!l.isError && <button onClick={() => markAsError(i)} className="self-end text-[10px] font-bold text-rose-500 bg-rose-50 px-3 py-1.5 rounded-full">입력오류 처리</button>}
                            </div>
                        ))}
                    </div>
                </div>
            );

            const RecordForm = () => {
                const [type, setType] = useState('병원');
                return (
                    <div className="p-6 pb-36 animate-in slide-in-from-bottom-10 duration-500">
                        <h2 className="text-2xl font-black mb-8">서비스 기록</h2>
                        <form onSubmit={async (e) => {
                            e.preventDefault();
                            const formData = new FormData(e.target);
                            const logData = {
                                sheetName: 'logs',
                                type: formData.get('type'),
                                date: formData.get('date'),
                                targetName: formData.get('targetName'),
                                provider: formData.get('provider'),
                                destination: formData.get('destination'),
                                purpose: formData.get('purpose') || '-',
                                dist: parseInt(formData.get('endDist')) - parseInt(formData.get('startDist')),
                                isError: false
                            };
                            setLogs([logData, ...logs]);
                            await syncToGoogle(logData);
                            showToast("저장되었습니다.");
                            setActiveTab('home');
                        }} className="space-y-4">
                            <div className="flex bg-slate-200/50 p-1.5 rounded-[1.8rem] mb-6">
                                <button type="button" onClick={()=>setType('병원')} className={`flex-1 py-3.5 rounded-[1.4rem] text-sm font-bold ${type==='병원'?'bg-white text-blue-600 shadow-md':'text-slate-500'}`}>어르신 병원</button>
                                <button type="button" onClick={()=>setType('이동')} className={`flex-1 py-3.5 rounded-[1.4rem] text-sm font-bold ${type==='이동'?'bg-white text-slate-800 shadow-md':'text-slate-500'}`}>보호사 이동</button>
                                <input type="hidden" name="type" value={type} />
                            </div>
                            <div className="bg-white p-7 rounded-[2.5rem] card-shadow border border-white space-y-5">
                                <select name="provider" required className="w-full bg-slate-50 p-4 rounded-2xl font-bold border-none appearance-none">
                                    <option value="">수행인력 선택</option>
                                    {staffs.map((s, i) => <option key={i} value={s.name}>{s.name} ({s.role})</option>)}
                                </select>
                                <select name="targetName" required className="w-full bg-slate-50 p-4 rounded-2xl font-bold text-blue-600 border-none appearance-none">
                                    <option value="">대상자 선택</option>
                                    {type==='병원' ? elders.map((e, i) => <option key={i} value={e.name}>{e.name}</option>) : workers.map((w, i) => <option key={i} value={w.name}>{w.name}</option>)}
                                </select>
                                <input name="date" type="date" required className="w-full bg-slate-50 p-4 rounded-2xl font-bold border-none" />
                                <input name="destination" placeholder="방문 목적지" required className="w-full bg-slate-50 p-4 rounded-2xl font-bold border-none" />
                                <input name="purpose" placeholder="비고/특이사항" className="w-full bg-slate-50 p-4 rounded-2xl border-none" />
                            </div>
                            <div className="bg-slate-900 p-7 rounded-[2.5rem] grid grid-cols-2 gap-4">
                                <input name="startDist" type="number" placeholder="출발(km)" required className="bg-slate-800 text-white p-4 rounded-2xl border-none" />
                                <input name="endDist" type="number" placeholder="도착(km)" required className="bg-slate-800 text-white p-4 rounded-2xl border-none" />
                            </div>
                            <button className="w-full btn-gradient text-white py-5 rounded-[2.2rem] font-black text-lg">기록 저장하기</button>
                        </form>
                    </div>
                );
            };

            const Manage = () => {
                const [mTab, setMTab] = useState('staff');
                const [showAdd, setShowAdd] = useState(false);
                return (
                    <div className="p-6 pb-36">
                        <div className="flex justify-between items-center mb-8">
                            <h2 className="text-2xl font-black">자원 관리</h2>
                            <div className="flex gap-2">
                                <button onClick={fetchDataFromGoogle} className="w-12 h-12 bg-white text-blue-600 rounded-2xl flex items-center justify-center card-shadow">
                                    <i className={`fas fa-download ${isSyncing ? 'animate-bounce' : ''}`}></i>
                                </button>
                                <button onClick={()=>setShowAdd(!showAdd)} className={`w-12 h-12 rounded-2xl flex items-center justify-center transition-all ${showAdd ? 'bg-slate-800 text-white rotate-45' : 'bg-white text-blue-600 card-shadow'}`}><i className="fas fa-plus"></i></button>
                            </div>
                        </div>
                        {/* 탭 및 목록 UI는 v14와 동일 */}
                        <div className="flex bg-slate-200/50 p-1 rounded-2xl mb-6 gap-1">
                            {['staff', 'worker', 'elder'].map(t => (
                                <button key={t} onClick={()=>setMTab(t)} className={`flex-1 py-3 px-1 rounded-xl text-[10px] font-black ${mTab===t?'bg-white text-blue-600 shadow-sm':'text-slate-400'}`}>{t==='staff'?'수행인력':t==='worker'?'보호사':'어르신'}</button>
                            ))}
                        </div>
                        {showAdd && (
                            <form onSubmit={async (e) => {
                                e.preventDefault();
                                const formData = new FormData(e.target);
                                const infoData = {
                                    sheetName: mTab==='staff'?'staffs':mTab==='worker'?'workers':'elders',
                                    name: formData.get('pName'),
                                    phone: formData.get('pPhone'),
                                    gender: formData.get('pGender'),
                                    birth: formData.get('pBirth'),
                                    role: formData.get('pRole') || '-'
                                };
                                if(mTab==='staff') setStaffs([infoData, ...staffs]);
                                else if(mTab==='worker') setWorkers([infoData, ...workers]);
                                else setElders([infoData, ...elders]);
                                await syncToGoogle(infoData);
                                setShowAdd(false);
                                e.target.reset();
                                showToast("등록되었습니다.");
                            }} className="bg-white p-7 rounded-[2.5rem] card-shadow mb-8 space-y-4 border border-white">
                                <div className="grid grid-cols-2 gap-3">
