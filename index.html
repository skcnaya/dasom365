<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>365 안심돌봄 통합버전 v18.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; letter-spacing: -0.03em; -webkit-tap-highlight-color: transparent; }
        .btn-gradient { background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%); }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.04); }
        .loading-spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-[#F8FAFC]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        // 최종 업데이트된 웹 앱 URL
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzR7ZP1-I40Nk0QRFEM50IcfTuPGwAgND5sl0YIuIsiYZKSaLsZPEV4XYlYdqbl7Ma4/exec";

        function App() {
            // DB States
            const [staffs, setStaffs] = useState(() => JSON.parse(localStorage.getItem('staffs')) || []);
            const [workers, setWorkers] = useState(() => JSON.parse(localStorage.getItem('workers')) || []);
            const [elders, setElders] = useState(() => JSON.parse(localStorage.getItem('elders')) || []);
            const [vehicles, setVehicles] = useState(() => JSON.parse(localStorage.getItem('vehicles')) || []);
            const [logs, setLogs] = useState(() => JSON.parse(localStorage.getItem('logs')) || []);
            
            // UI States
            const [activeTab, setActiveTab] = useState('home');
            const [manageSubTab, setManageSubTab] = useState('staffs'); 
            const [showAddForm, setShowAddForm] = useState(false);
            const [isSyncing, setIsSyncing] = useState(false);
            const [toast, setToast] = useState({ show: false, msg: '' });
            const [showClearConfirm, setShowClearConfirm] = useState(false);

            // Form States
            const [recordType, setRecordType] = useState('차량운행'); // 병원동행, 인력이동, 차량운행
            const [photoPreview, setPhotoPreview] = useState(null);
            const [photoBase64, setPhotoBase64] = useState(null);
            const [startDist, setStartDist] = useState('');
            const [endDist, setEndDist] = useState('');

            // 로컬 스토리지 동기화
            useEffect(() => {
                localStorage.setItem('staffs', JSON.stringify(staffs));
                localStorage.setItem('workers', JSON.stringify(workers));
                localStorage.setItem('elders', JSON.stringify(elders));
                localStorage.setItem('vehicles', JSON.stringify(vehicles));
                localStorage.setItem('logs', JSON.stringify(logs));
            }, [staffs, workers, elders, vehicles, logs]);

            const showToast = (msg) => {
                setToast({ show: true, msg });
                setTimeout(() => setToast({ show: false }), 2000);
            };

            // 데이터 동기화
            const syncData = useCallback(async () => {
                if (!GOOGLE_SCRIPT_URL.startsWith("http")) return;
                setIsSyncing(true);
                showToast("데이터 동기화 중...");
                try {
                    const response = await fetch(`${GOOGLE_SCRIPT_URL}?action=getData`);
                    const result = await response.json();
                    if (result.status === 'success') {
                        setStaffs(result.data.staffs || []);
                        setWorkers(result.data.workers || []);
                        setElders(result.data.elders || []);
                        if (result.data.vehicles) setVehicles(result.data.vehicles);
                        setLogs(result.data.logs || []);
                        showToast("동기화 완료!");
                    }
                } catch (e) {
                    showToast("연결 실패");
                } finally {
                    setIsSyncing(false);
                }
            }, []);

            useEffect(() => { syncData(); }, [syncData]);

            // 기기 데이터 초기화 함수 (자체 모달용)
            const executeClearData = () => {
                localStorage.clear();
                setStaffs([]);
                setWorkers([]);
                setElders([]);
                setVehicles([]);
                setLogs([]);
                setShowClearConfirm(false);
                showToast("기록 삭제 및 초기화 중...");
                setTimeout(() => {
                    syncData(); // 초기화 후 바로 동기화 실행
                }, 500);
            };

            // 오류 토글
            const toggleError = async (index) => {
                const newLogs = [...logs];
                const targetLog = newLogs[index];
                targetLog.isError = !targetLog.isError;
                setLogs(newLogs);
                showToast(targetLog.isError ? "오류 표시됨" : "오류 취소됨");

                try {
                    fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify({
                            action: 'updateError',
                            sheetName: 'logs',
                            date: targetLog.date,
                            targetName: targetLog.targetName,
                            provider: targetLog.provider,
                            isError: targetLog.isError
                        })
                    });
                } catch (err) {
                    console.error(err);
                }
            };

            // 인원/차량 DB 추가 기능
            const handleAddData = async (e) => {
                e.preventDefault();
                const fd = new FormData(e.target);
                let newData;

                if (manageSubTab === 'vehicles') {
                    newData = {
                        sheetName: 'vehicles',
                        name: fd.get('name'),
                        carNumber: fd.get('carNumber') || '',
                        note: fd.get('note') || ''
                    };
                    setVehicles([newData, ...vehicles]);
                } else {
                    newData = {
                        sheetName: manageSubTab,
                        name: fd.get('name'),
                        phone: fd.get('phone'),
                        gender: fd.get('gender'),
                        birth: fd.get('birth'),
                        role: fd.get('role') || '일반'
                    };

                    if (manageSubTab === 'staffs') setStaffs([newData, ...staffs]);
                    else if (manageSubTab === 'workers') setWorkers([newData, ...workers]);
                    else setElders([newData, ...elders]);
                }

                showToast("DB 저장 중...");
                try {
                    fetch(GOOGLE_SCRIPT_URL, { 
                        method: 'POST', 
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify(newData) 
                    });
                } catch (err) {
                    showToast("전송 실패");
                }
                setShowAddForm(false);
                e.target.reset();
            };

            const handlePhotoChange = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let MAX_WIDTH = 800;
                        let width = img.width;
                        let height = img.height;
                        if (width > MAX_WIDTH) {
                            height = height * (MAX_WIDTH / width);
                            width = MAX_WIDTH;
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        const base64String = canvas.toDataURL('image/jpeg', 0.7);
                        setPhotoBase64(base64String.split(',')[1]);
                        setPhotoPreview(base64String);
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            };

            // 기록 저장 (logs 시트로 전송)
            const saveLog = async (e) => {
                e.preventDefault();
                const fd = new FormData(e.target);
                const start = Number(startDist) || 0;
                const end = Number(endDist) || 0;
                const distance = end - start;

                if (recordType === '차량운행' && distance < 0) {
                    showToast("종료 거리가 시작보다 작을 수 없습니다.");
                    return;
                }

                const data = {
                    sheetName: 'logs',
                    type: recordType,
                    carName: fd.get('carName') || '',
                    date: fd.get('date'),
                    targetName: fd.get('targetName') || '없음',
                    provider: fd.get('provider'),
                    destination: fd.get('destination'),
                    purpose: fd.get('purpose') || '-',
                    dist: distance,
                    startDist: start,
                    endDist: end,
                    isError: false,
                    photo: photoBase64,
                    photoUrl: photoPreview // 로컬 화면 렌더링용
                };
                
                // 화면 즉시 반영
                setLogs([data, ...logs]);
                showToast("기록 업로드 중...");
                
                try {
                    fetch(GOOGLE_SCRIPT_URL, { 
                        method: 'POST', 
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify(data) 
                    });
                    
                    setActiveTab('home');
                    setStartDist('');
                    setEndDist('');
                    setPhotoBase64(null);
                    setPhotoPreview(null);
                } catch (err) {
                    showToast("전송 실패");
                }
            };

            return (
                <div className="max-w-md mx-auto min-h-screen relative pb-28 bg-[#F8FAFC]">
                    {/* 상단 헤더 */}
                    <div className="p-6 flex justify-between items-center bg-white/50 backdrop-blur-md sticky top-0 z-40 border-b border-slate-100">
                        <div>
                            <h1 className="text-2xl font-black text-slate-900 tracking-tighter">365 안심돌봄</h1>
                            <p className="text-[10px] text-blue-600 font-bold uppercase tracking-widest">Jeongeup Dasom</p>
                        </div>
                        <button onClick={syncData} disabled={isSyncing} className={`w-10 h-10 rounded-xl bg-white shadow-sm border border-slate-100 flex items-center justify-center ${isSyncing ? 'text-blue-500 bg-blue-50' : 'text-slate-400'}`}>
                            <i className={`fas fa-sync-alt ${isSyncing ? 'loading-spin' : ''}`}></i>
                        </button>
                    </div>

                    {/* 메인 홈 - 최근 기록 */}
                    {activeTab === 'home' && (
                        <div className="p-6 space-y-4 animate-in fade-in duration-500">
                            <div className="flex justify-between items-center px-1">
                                <h2 className="text-sm font-black text-slate-800">최근 활동 로그</h2>
                                <span className="text-[10px] text-slate-400 font-bold">Total {logs.length}</span>
                            </div>
                            {logs.length === 0 ? (
                                <div className="text-center py-20 text-slate-300 text-sm font-medium bg-white rounded-[2rem] card-shadow border border-dashed">기록이 없습니다.</div>
                            ) : (
                                logs.slice(0, 20).map((l, i) => (
                                    <div key={i} className={`bg-white p-5 rounded-[2rem] card-shadow border border-white transition-all ${l.isError ? 'opacity-40 grayscale' : ''}`}>
                                        <div className="flex justify-between items-start">
                                            <div className="flex gap-3">
                                                <div className="w-10 h-10 bg-blue-50 text-blue-500 rounded-2xl flex items-center justify-center text-xs shrink-0">
                                                    <i className={`fas ${l.type === '병원동행' ? 'fa-hospital' : l.type === '인력이동' ? 'fa-walking' : 'fa-car-side'}`}></i>
                                                </div>
                                                <div className="overflow-hidden">
                                                    <div className="flex items-center gap-2 flex-wrap">
                                                        <p className={`font-bold text-sm truncate ${l.isError ? 'line-through text-slate-500' : 'text-slate-800'}`}>
                                                            {l.type === '차량운행' ? l.destination : l.targetName}
                                                        </p>
                                                        <span className="text-[9px] bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded font-bold">{l.type}</span>
                                                        {l.carName && <span className="text-[9px] bg-blue-50 text-blue-600 px-1.5 py-0.5 rounded font-bold">{l.carName.split('(')[0]}</span>}
                                                    </div>
                                                    <p className="text-[10px] text-slate-400 font-medium mt-1">{l.date} · 담당: {l.provider}</p>
                                                </div>
                                            </div>
                                            <div className="flex flex-col items-end gap-1 shrink-0">
                                                {l.dist > 0 && <p className="text-xs font-black text-blue-600">+{l.dist}km</p>}
                                                <button 
                                                    onClick={() => toggleError(i)} 
                                                    className={`text-[9px] px-2 py-1 rounded-md font-bold transition-colors mt-1 ${l.isError ? 'bg-slate-200 text-slate-500' : 'bg-red-50 text-red-500 hover:bg-red-100'}`}
                                                >
                                                    {l.isError ? '오류 취소' : '오류 표시'}
                                                </button>
                                            </div>
                                        </div>
                                        {l.type !== '차량운행' && (
                                            <p className="text-xs mt-3 text-slate-500 font-medium px-1 flex items-start gap-1">
                                                <i className="fas fa-map-marker-alt mt-0.5 shrink-0 text-slate-400"></i>
                                                <span className="truncate">{l.destination}</span>
                                            </p>
                                        )}
                                    </div>
                                ))
                            )}
                        </div>
                    )}

                    {/* 기록 폼 탭 */}
                    {activeTab === 'record' && (
                        <div className="p-6 animate-in slide-in-from-bottom-10 duration-500">
                            <h2 className="text-2xl font-black mb-6 text-slate-800">현장 서비스 기록</h2>
                            <form onSubmit={saveLog} className="space-y-4">
                                <div className="bg-white p-7 rounded-[2.5rem] card-shadow border border-white space-y-5">
                                    
                                    {/* 서비스 유형 선택 */}
                                    <div className="flex bg-slate-100 p-1 rounded-2xl">
                                        {['병원동행', '인력이동', '차량운행'].map(type => (
                                            <button 
                                                key={type} type="button"
                                                onClick={() => setRecordType(type)} 
                                                className={`flex-1 py-3 rounded-xl text-[11px] font-bold transition-all ${recordType === type ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-400'}`}
                                            >
                                                {type}
                                            </button>
                                        ))}
                                    </div>

                                    <div className="space-y-4">
                                        {/* 모든 탭에서 차량 선택 가능하도록 함 */}
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-bold text-slate-400 ml-2 uppercase tracking-tighter">이용 차량 (선택)</label>
                                            <select name="carName" required={recordType === '차량운행'} className="w-full p-4 bg-slate-50 rounded-2xl font-bold border-none appearance-none text-slate-800">
                                                <option value="">차량 이용 안함 / 해당 없음</option>
                                                {vehicles.map((v, i) => {
                                                    const displayName = v.carNumber ? `${v.name} (${v.carNumber})` : v.name;
                                                    return <option key={i} value={displayName}>{displayName}</option>;
                                                })}
                                            </select>
                                        </div>

                                        <div className="space-y-1">
                                            <label className="text-[10px] font-bold text-slate-400 ml-2 uppercase tracking-tighter">담당/운행 인력</label>
                                            <select name="provider" required className="w-full p-4 bg-slate-50 rounded-2xl font-bold border-none appearance-none text-slate-800">
                                                <option value="">인력 선택</option>
                                                {staffs.map((s,i)=><option key={i} value={s.name}>{s.name} ({s.role})</option>)}
                                            </select>
                                        </div>

                                        <div className="space-y-1">
                                            <label className="text-[10px] font-bold text-slate-400 ml-2 uppercase tracking-tighter">대상자 (선택)</label>
                                            <select name="targetName" className="w-full p-4 bg-slate-50 rounded-2xl font-bold text-blue-600 border-none appearance-none">
                                                <option value="없음">해당 없음</option>
                                                {[...elders, ...workers].map((e,i)=><option key={i} value={e.name}>{e.name}</option>)}
                                            </select>
                                        </div>

                                        <div className="grid grid-cols-1 gap-4">
                                            <div className="space-y-1">
                                                <label className="text-[10px] font-bold text-slate-400 ml-2 uppercase tracking-tighter">날짜</label>
                                                <input type="date" name="date" required className="w-full p-4 bg-slate-50 rounded-2xl font-bold border-none text-slate-800" defaultValue={new Date().toISOString().split('T')[0]} />
                                            </div>
                                            <div className="space-y-1">
                                                <label className="text-[10px] font-bold text-slate-400 ml-2 uppercase tracking-tighter">행선지(목적지)</label>
                                                <input name="destination" placeholder="장소명 입력" required className="w-full p-4 bg-slate-50 rounded-2xl font-bold border-none text-slate-800" />
                                            </div>
                                        </div>

                                        {/* 사진 촬영/업로드 영역 */}
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-bold text-slate-400 ml-2 uppercase tracking-tighter">현장 증빙 사진</label>
                                            <div className="relative w-full h-32 bg-slate-50 rounded-2xl border-none flex flex-col items-center justify-center overflow-hidden ring-2 ring-slate-100 ring-inset">
                                                {photoPreview ? (
                                                    <div className="relative w-full h-full">
                                                        <img src={photoPreview} className="w-full h-full object-cover opacity-90" alt="미리보기" />
                                                        <button type="button" onClick={() => {setPhotoPreview(null); setPhotoBase64(null);}} className="absolute top-2 right-2 bg-slate-900/60 text-white w-8 h-8 rounded-full flex items-center justify-center text-xs backdrop-blur-md">
                                                            <i className="fas fa-times"></i>
                                                        </button>
                                                    </div>
                                                ) : (
                                                    <label className="w-full h-full flex flex-col items-center justify-center cursor-pointer text-slate-400 hover:text-blue-500 hover:bg-blue-50 transition-colors">
                                                        <i className="fas fa-camera text-2xl mb-2"></i>
                                                        <span className="text-[10px] font-bold">사진 촬영 또는 첨부</span>
                                                        <input type="file" accept="image/*" capture="environment" onChange={handlePhotoChange} className="hidden" />
                                                    </label>
                                                )}
                                            </div>
                                        </div>

                                        {recordType !== '차량운행' && (
                                            <input name="purpose" placeholder="비고 (특이사항 또는 세부내용)" className="w-full p-4 bg-slate-50 rounded-2xl border-none text-slate-800" />
                                        )}
                                    </div>
                                </div>

                                {/* 거리 계산기 */}
                                <div className="bg-slate-900 p-7 rounded-[2.5rem] shadow-xl space-y-4">
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="space-y-1">
                                            <span className="text-[9px] text-slate-500 font-bold ml-1 uppercase tracking-wider">시작 거리(km)</span>
                                            <input type="number" value={startDist} onChange={(e)=>setStartDist(e.target.value)} placeholder="0" className="w-full bg-slate-800 text-white p-4 rounded-xl border-none font-bold text-center text-lg focus:ring-2 focus:ring-blue-500" />
                                        </div>
                                        <div className="space-y-1">
                                            <span className="text-[9px] text-slate-500 font-bold ml-1 uppercase tracking-wider">종료 거리(km)</span>
                                            <input type="number" value={endDist} onChange={(e)=>setEndDist(e.target.value)} placeholder="0" className="w-full bg-slate-800 text-white p-4 rounded-xl border-none font-bold text-center text-lg focus:ring-2 focus:ring-blue-500" />
                                        </div>
                                    </div>
                                    <div className="pt-2 text-center border-t border-slate-800">
                                        <p className="text-slate-500 text-[10px] font-bold uppercase mb-1">총 주행거리</p>
                                        <p className="text-3xl font-black text-blue-400">
                                            { (Number(endDist) - Number(startDist)) > 0 ? (Number(endDist) - Number(startDist)) : 0 } <span className="text-sm">km</span>
                                        </p>
                                    </div>
                                </div>

                                <button type="submit" className="w-full btn-gradient text-white py-5 rounded-[2rem] font-black text-lg shadow-xl shadow-blue-200 active:scale-95 transition-transform">데이터 전송</button>
                            </form>
                        </div>
                    )}

                    {/* 자원/인원/차량 관리 탭 */}
                    {activeTab === 'manage' && (
                        <div className="p-6 animate-in fade-in duration-500">
                            <div className="flex justify-between items-center mb-6">
                                <h2 className="text-2xl font-black text-slate-800">통합 DB 관리</h2>
                                <div className="flex gap-2">
                                    <button onClick={() => setShowClearConfirm(true)} className="w-12 h-12 rounded-2xl flex items-center justify-center bg-red-50 text-red-500 card-shadow border border-red-100 transition-all active:scale-95" title="데이터 초기화">
                                        <i className="fas fa-trash-alt"></i>
                                    </button>
                                    <button onClick={() => setShowAddForm(!showAddForm)} className={`w-12 h-12 rounded-2xl flex items-center justify-center transition-all ${showAddForm ? 'bg-slate-800 text-white rotate-45' : 'bg-white text-blue-600 card-shadow border border-slate-100'}`}>
                                        <i className="fas fa-plus"></i>
                                    </button>
                                </div>
                            </div>

                            <div className="flex bg-slate-200/50 p-1 rounded-2xl mb-6">
                                {['staffs', 'workers', 'elders', 'vehicles'].map(tab => (
                                    <button key={tab} onClick={() => {setManageSubTab(tab); setShowAddForm(false);}} className={`flex-1 py-3 rounded-xl text-[11px] font-bold transition-all ${manageSubTab === tab ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-400'}`}>
                                        {tab === 'staffs' ? '스테프' : tab === 'workers' ? '보호사' : tab === 'elders' ? '어르신' : '차량'}
                                    </button>
                                ))}
                            </div>

                            {/* DB 추가 폼 */}
                            {showAddForm && (
                                <form onSubmit={handleAddData} className="bg-white p-6 rounded-[2.5rem] card-shadow border border-white mb-8 space-y-4 animate-in slide-in-from-top-5">
                                    <p className="text-[10px] font-black text-blue-600 uppercase text-center mb-2">{manageSubTab === 'vehicles' ? '차량' : manageSubTab} 신규 추가</p>
                                    
                                    {manageSubTab === 'vehicles' ? (
                                        <>
                                            <div className="grid grid-cols-2 gap-3">
                                                <input name="name" placeholder="차량명 (예: 스타렉스)" required className="bg-slate-50 p-4 rounded-2xl border-none font-bold text-slate-800" />
                                                <input name="carNumber" placeholder="차량번호 (예: 12가 3456)" required className="bg-slate-50 p-4 rounded-2xl border-none font-bold text-slate-800" />
                                            </div>
                                            <input name="note" placeholder="비고 (연식, 차종 등)" className="w-full bg-slate-50 p-4 rounded-2xl border-none font-bold text-slate-800" />
                                        </>
                                    ) : (
                                        <>
                                            <div className="grid grid-cols-2 gap-3">
                                                <input name="name" placeholder="성함" required className="bg-slate-50 p-4 rounded-2xl border-none font-bold text-slate-800" />
                                                <select name="gender" className="bg-slate-50 p-4 rounded-2xl border-none font-bold text-slate-800">
                                                    <option value="남">남성</option>
                                                    <option value="여">여성</option>
                                                </select>
                                            </div>
                                            <input name="phone" placeholder="연락처 (- 포함)" required className="w-full bg-slate-50 p-4 rounded-2xl border-none font-bold text-slate-800" />
                                            <input name="birth" type="date" required className="w-full bg-slate-50 p-4 rounded-2xl border-none font-bold text-slate-400" />
                                            <input name="role" placeholder="소속센터 또는 담당직무" className="w-full bg-slate-50 p-4 rounded-2xl border-none font-bold text-slate-800" />
                                        </>
                                    )}
                                    <button className="w-full btn-gradient text-white py-4 rounded-2xl font-black">데이터베이스 저장</button>
                                </form>
                            )}

                            {/* DB 리스트 표시 */}
                            <div className="space-y-3">
                                {manageSubTab === 'vehicles' ? (
                                    vehicles.map((v, i) => (
                                        <div key={i} className="bg-white p-5 rounded-[2rem] flex justify-between items-center card-shadow border border-white">
                                            <div className="flex items-center gap-4">
                                                <div className="w-11 h-11 bg-blue-50 rounded-full flex items-center justify-center text-blue-500 font-bold text-sm shrink-0"><i className="fas fa-car"></i></div>
                                                <div className="overflow-hidden">
                                                    <p className="font-bold text-slate-800 text-sm truncate">{v.name}</p>
                                                    <p className="text-[11px] text-slate-400 font-medium truncate">{v.carNumber || '차량번호 없음'} {v.note ? `· ${v.note}` : ''}</p>
                                                </div>
                                            </div>
                                        </div>
                                    ))
                                ) : (
                                    (manageSubTab === 'staffs' ? staffs : manageSubTab === 'workers' ? workers : elders).map((p, i) => (
                                        <div key={i} className="bg-white p-5 rounded-[2rem] flex justify-between items-center card-shadow border border-white">
                                            <div className="flex items-center gap-4">
                                                <div className="w-11 h-11 bg-slate-100 rounded-full flex items-center justify-center text-slate-500 font-bold text-xs uppercase shrink-0">{p.name?.[0]}</div>
                                                <div className="overflow-hidden">
                                                    <p className="font-bold text-slate-800 text-sm truncate">{p.name} <span className="text-[10px] font-normal text-slate-400">({p.gender})</span></p>
                                                    <p className="text-[11px] text-blue-600 font-bold truncate">{p.phone}</p>
                                                </div>
                                            </div>
                                            <a href={`tel:${p.phone}`} className="w-10 h-10 bg-emerald-50 text-emerald-600 rounded-xl flex items-center justify-center shrink-0 active:scale-95 transition-transform"><i className="fas fa-phone-alt"></i></a>
                                        </div>
                                    ))
                                )}
                            </div>
                        </div>
                    )}

                    {/* 하단 탭 네비게이션 */}
                    <nav className="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-xl border-t border-slate-100 flex justify-around p-5 rounded-t-[2.5rem] z-50">
                        <button onClick={() => setActiveTab('home')} className={`text-xl transition-colors ${activeTab === 'home' ? 'text-blue-600' : 'text-slate-300'}`}><i className="fas fa-home"></i></button>
                        <button onClick={() => setActiveTab('record')} className="bg-blue-600 text-white w-14 h-14 rounded-2xl flex items-center justify-center -translate-y-10 shadow-xl shadow-blue-200 active:scale-90 transition-transform"><i className="fas fa-plus text-xl"></i></button>
                        <button onClick={() => setActiveTab('manage')} className={`text-xl transition-colors ${activeTab === 'manage' ? 'text-blue-600' : 'text-slate-300'}`}><i className="fas fa-database"></i></button>
                    </nav>

                    {/* 알림 토스트 */}
                    {toast.show && (
                        <div className="fixed bottom-28 left-1/2 -translate-x-1/2 bg-slate-800/90 backdrop-blur-sm text-white px-6 py-3 rounded-full text-[11px] font-bold z-[100] animate-bounce shadow-2xl flex items-center gap-2 whitespace-nowrap">
                            <div className="w-1.5 h-1.5 bg-blue-400 rounded-full"></div>
                            {toast.msg}
                        </div>
                    )}

                    {/* 초기화 확인 자체 팝업(모달) */}
                    {showClearConfirm && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[110] flex items-center justify-center p-6 animate-in fade-in duration-200">
                            <div className="bg-white rounded-[2.5rem] p-7 w-full max-w-sm card-shadow shadow-2xl">
                                <div className="w-14 h-14 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-5 text-2xl">
                                    <i className="fas fa-exclamation-triangle"></i>
                                </div>
                                <h3 className="text-xl font-black text-center text-slate-800 mb-2">데이터 초기화</h3>
                                <p className="text-xs text-center text-slate-500 mb-7 font-medium leading-relaxed">
                                    기기에 임시 저장된 과거 데이터를 지우고<br/>구글 시트에서 최신 데이터를 다시 불러옵니다.<br/><span className="text-red-400 font-bold">(구글 시트의 원본 데이터는 안전합니다)</span>
                                </p>
                                <div className="flex gap-3">
                                    <button onClick={() => setShowClearConfirm(false)} className="flex-1 py-4 rounded-2xl bg-slate-100 text-slate-600 font-black text-sm active:scale-95 transition-transform">취소</button>
                                    <button onClick={executeClearData} className="flex-1 py-4 rounded-2xl bg-red-500 text-white font-black text-sm shadow-lg shadow-red-200 active:scale-95 transition-transform">초기화 진행</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
