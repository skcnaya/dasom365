<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>365 안심돌봄 v15.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; letter-spacing: -0.03em; -webkit-tap-highlight-color: transparent; }
        .btn-gradient { background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%); }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.04); }
        .loading-spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-[#F8FAFC]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ★★★ 본인의 구글 웹 앱 URL을 여기에 입력하세요 ★★★
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbycZ8jnao0BW7YbRgkSko4jFn1N9ydQ4-wc5yTUOzjIoZ4XPy92KqFK21sWkUY_VcUqcQ/exec";

        function App() {
            const [staffs, setStaffs] = useState(() => JSON.parse(localStorage.getItem('staffs')) || []);
            const [workers, setWorkers] = useState(() => JSON.parse(localStorage.getItem('workers')) || []);
            const [elders, setElders] = useState(() => JSON.parse(localStorage.getItem('elders')) || []);
            const [logs, setLogs] = useState(() => JSON.parse(localStorage.getItem('logs')) || []);
            
            const [activeTab, setActiveTab] = useState('home');
            const [manageSubTab, setManageSubTab] = useState('staffs'); 
            const [showAddForm, setShowAddForm] = useState(false);
            const [isSyncing, setIsSyncing] = useState(false);
            const [toast, setToast] = useState({ show: false, msg: '' });

            // 사진 업로드 관련 상태
            const [photoBase64, setPhotoBase64] = useState(null);
            const [photoPreview, setPhotoPreview] = useState(null);

            useEffect(() => {
                localStorage.setItem('staffs', JSON.stringify(staffs));
                localStorage.setItem('workers', JSON.stringify(workers));
                localStorage.setItem('elders', JSON.stringify(elders));
                localStorage.setItem('logs', JSON.stringify(logs));
            }, [staffs, workers, elders, logs]);

            const showToast = (msg) => {
                setToast({ show: true, msg });
                setTimeout(() => setToast({ show: false }), 2000);
            };

            // 사진 선택 및 압축 처리
            const handlePhotoChange = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let MAX_WIDTH = 800; // 가로 최대 800px로 압축
                        let width = img.width;
                        let height = img.height;

                        if (width > MAX_WIDTH) {
                            height = height * (MAX_WIDTH / width);
                            width = MAX_WIDTH;
                        }

                        canvas.width = width;
                        canvas.height = height;

                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        // 용량을 줄이기 위해 jpeg 70% 품질로 인코딩
                        const base64String = canvas.toDataURL('image/jpeg', 0.7);
                        // 구글 서버에 보낼 순수 데이터 추출
                        setPhotoBase64(base64String.split(',')[1]);
                        // 앱 화면에 띄울 미리보기 URL 세팅
                        setPhotoPreview(base64String);
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            };

            const toggleError = async (index) => {
                const newLogs = [...logs];
                const targetLog = newLogs[index];
                
                targetLog.isError = !targetLog.isError;
                setLogs(newLogs);
                showToast(targetLog.isError ? "오류 처리되었습니다." : "오류 처리가 취소되었습니다.");

                try {
                    await fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify({
                            action: 'updateError',
                            sheetName: 'logs',
                            date: targetLog.date,
                            targetName: targetLog.targetName,
                            provider: targetLog.provider,
                            isError: targetLog.isError
                        })
                    });
                } catch (err) {
                    console.error("업데이트 에러:", err);
                }
            };

            const syncData = async () => {
                if (!GOOGLE_SCRIPT_URL.startsWith("http")) return alert("URL을 설정해주세요.");
                setIsSyncing(true);
                showToast("데이터 불러오는 중...");
                try {
                    const res = await fetch(`${GOOGLE_SCRIPT_URL}?action=getData`);
                    const json = await res.json();
                    if (json.status === 'success') {
                        setStaffs(json.data.staffs || []);
                        setWorkers(json.data.workers || []);
                        setElders(json.data.elders || []);
                        setLogs(json.data.logs || []);
                        showToast("동기화 완료!");
                    }
                } catch (e) { showToast("연결 실패"); }
                finally { setIsSyncing(false); }
            };

            const handleAddPerson = async (e) => {
                e.preventDefault();
                const fd = new FormData(e.target);
                const newPerson = {
                    sheetName: manageSubTab,
                    name: fd.get('name'),
                    phone: fd.get('phone'),
                    gender: fd.get('gender'),
                    birth: fd.get('birth'),
                    role: fd.get('role') || '일반'
                };

                if (manageSubTab === 'staffs') setStaffs([newPerson, ...staffs]);
                else if (manageSubTab === 'workers') setWorkers([newPerson, ...workers]);
                else setElders([newPerson, ...elders]);

                fetch(GOOGLE_SCRIPT_URL, { 
                    method: 'POST', 
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(newPerson) 
                }).catch(err => console.error('Error:', err));
                
                showToast("등록되었습니다.");
                setShowAddForm(false);
                e.target.reset();
            };

            const saveLog = async (e) => {
                e.preventDefault();
                const fd = new FormData(e.target);
                const data = {
                    sheetName: 'logs',
                    type: fd.get('type'),
                    date: fd.get('date'),
                    targetName: fd.get('targetName'),
                    provider: fd.get('provider'),
                    destination: fd.get('destination'),
                    purpose: fd.get('purpose') || '-',
                    dist: Number(fd.get('end')) - Number(fd.get('start')),
                    isError: false,
                    photo: photoBase64, // 사진 데이터 추가
                    photoUrl: photoPreview // 로컬 미리보기용 추가
                };
                setLogs([data, ...logs]);
                
                if(photoBase64) showToast("사진과 함께 기록 중...");
                
                fetch(GOOGLE_SCRIPT_URL, { 
                    method: 'POST', 
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(data) 
                }).catch(err => console.error('Error:', err));
                
                if(!photoBase64) showToast("기록 완료");
                
                // 폼 초기화
                setPhotoBase64(null);
                setPhotoPreview(null);
                setActiveTab('home');
            };

            return (
                <div className="max-w-md mx-auto min-h-screen relative pb-28 bg-[#F8FAFC]">
                    {/* 상단 헤더 */}
                    <div className="p-6 flex justify-between items-center bg-white/50 backdrop-blur-md sticky top-0 z-40">
                        <div>
                            <h1 className="text-2xl font-black text-slate-900 tracking-tighter">365 안심돌봄</h1>
                            <p className="text-[10px] text-blue-600 font-bold uppercase tracking-widest">Jeongeup Dasom</p>
                        </div>
                        <button onClick={syncData} className={`w-10 h-10 rounded-xl bg-white shadow-sm border border-slate-100 flex items-center justify-center ${isSyncing ? 'text-blue-500' : 'text-slate-400'}`}>
                            <i className={`fas fa-sync-alt ${isSyncing ? 'loading-spin' : ''}`}></i>
                        </button>
                    </div>

                    {/* 메인 홈 - 최근 기록 */}
                    {activeTab === 'home' && (
                        <div className="p-6 space-y-4 animate-in fade-in duration-500">
                            <div className="flex justify-between items-center px-1">
                                <h2 className="text-sm font-black text-slate-800">최근 활동 로그</h2>
                                <span className="text-[10px] text-slate-400 font-bold">최근 10건</span>
                            </div>
                            {logs.length === 0 ? (
                                <div className="text-center py-20 text-slate-300 text-sm font-medium bg-white rounded-[2rem] card-shadow border border-dashed">기록이 없습니다.</div>
                            ) : (
                                logs.slice(0, 10).map((l, i) => (
                                    <div key={i} className={`bg-white p-5 rounded-[2rem] card-shadow border border-white transition-all ${l.isError ? 'opacity-40 grayscale' : ''}`}>
                                        <div className="flex justify-between items-start">
                                            <div className="flex gap-3">
                                                <div className="w-10 h-10 bg-blue-50 text-blue-500 rounded-2xl flex items-center justify-center text-xs shrink-0">
                                                    <i className={`fas ${l.type === '병원동행' ? 'fa-hospital' : 'fa-car'}`}></i>
                                                </div>
                                                <div>
                                                    <div className="flex items-center gap-2 flex-wrap">
                                                        <p className={`font-bold text-sm ${l.isError ? 'line-through text-slate-500' : 'text-slate-800'}`}>{l.targetName}</p>
                                                        {l.isError && <span className="text-[10px] bg-red-100 text-red-600 px-2 py-0.5 rounded-md font-black">입력 오류</span>}
                                                        {l.photoUrl && !l.isError && (
                                                            <a href={l.photoUrl} target="_blank" className="text-[10px] bg-emerald-100 text-emerald-600 px-2 py-0.5 rounded-md font-black flex items-center gap-1 active:scale-95 transition-transform">
                                                                <i className="fas fa-image"></i> 사진
                                                            </a>
                                                        )}
                                                    </div>
                                                    <p className="text-[10px] text-slate-400 font-medium">{l.date} · {l.provider}</p>
                                                </div>
                                            </div>
                                            <div className="flex flex-col items-end gap-2 shrink-0">
                                                <p className="text-xs font-black text-blue-600">+{l.dist}km</p>
                                                <button 
                                                    onClick={() => toggleError(i)} 
                                                    className={`text-[10px] px-2 py-1 rounded-md font-bold transition-colors ${l.isError ? 'bg-slate-200 text-slate-500' : 'bg-red-50 text-red-500 hover:bg-red-100'}`}
                                                >
                                                    {l.isError ? '오류 취소' : '입력 오류'}
                                                </button>
                                            </div>
                                        </div>
                                        <p className="text-xs mt-3 text-slate-500 font-medium px-1"><i className="fas fa-map-marker-alt mr-1"></i>{l.destination}</p>
                                    </div>
                                ))
                            )}
                        </div>
                    )}

                    {/* 서비스 기록 폼 */}
                    {activeTab === 'record' && (
                        <div className="p-6 animate-in slide-in-from-bottom-10 duration-500">
                            <h2 className="text-2xl font-black mb-6">기록하기</h2>
                            <form onSubmit={saveLog} className="space-y-4">
                                <div className="bg-white p-7 rounded-[2.5rem] card-shadow border border-white space-y-5">
                                    <div className="flex bg-slate-100 p-1 rounded-2xl">
                                        <select name="type" className="w-full bg-transparent p-3 font-bold text-center border-none appearance-none">
                                            <option value="병원동행">병원 동행</option>
                                            <option value="인력이동">인력 이동</option>
                                        </select>
                                    </div>
                                    <div className="space-y-4">
                                        <select name="provider" required className="w-full p-4 bg-slate-50 rounded-2xl font-bold border-none appearance-none">
                                            <option value="">수행 인력 선택</option>
                                            {staffs.map((s,i)=><option key={i} value={s.name}>{s.name} ({s.role})</option>)}
                                        </select>
                                        <select name="targetName" required className="w-full p-4 bg-slate-50 rounded-2xl font-bold text-blue-600 border-none appearance-none">
                                            <option value="">대상자 선택</option>
                                            {[...elders, ...workers].map((e,i)=><option key={i} value={e.name}>{e.name}</option>)}
                                        </select>
                                        <div className="grid grid-cols-1 gap-4">
                                            <div className="space-y-1">
                                                <label className="text-[10px] font-bold text-slate-400 ml-2 uppercase">방문 일자</label>
                                                <input type="date" name="date" required className="w-full p-4 bg-slate-50 rounded-2xl font-bold border-none" />
                                            </div>
                                            <div className="space-y-1">
                                                <label className="text-[10px] font-bold text-slate-400 ml-2 uppercase">목적지</label>
                                                <input name="destination" placeholder="장소명 입력" required className="w-full p-4 bg-slate-50 rounded-2xl font-bold border-none" />
                                            </div>
                                        </div>

                                        {/* 현장 사진 업로드 UI */}
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-bold text-slate-400 ml-2 uppercase">현장 사진 (선택)</label>
                                            <div className="relative w-full h-28 bg-slate-50 rounded-2xl border-none flex flex-col items-center justify-center overflow-hidden transition-all">
                                                {photoPreview ? (
                                                    <div className="relative w-full h-full">
                                                        <img src={photoPreview} className="w-full h-full object-cover opacity-90" alt="미리보기" />
                                                        <button type="button" onClick={() => {setPhotoPreview(null); setPhotoBase64(null);}} className="absolute top-2 right-2 bg-slate-900/50 text-white w-7 h-7 rounded-full flex items-center justify-center text-xs backdrop-blur-md">
                                                            <i className="fas fa-times"></i>
                                                        </button>
                                                    </div>
                                                ) : (
                                                    <label className="w-full h-full flex flex-col items-center justify-center cursor-pointer text-slate-400 hover:text-blue-500 hover:bg-blue-50 transition-colors">
                                                        <i className="fas fa-camera text-2xl mb-2"></i>
                                                        <span className="text-[10px] font-bold">사진 촬영 또는 첨부하기</span>
                                                        <input type="file" accept="image/*" capture="environment" onChange={handlePhotoChange} className="hidden" />
                                                    </label>
                                                )}
                                            </div>
                                        </div>

                                        <input name="purpose" placeholder="비고 (선택사항)" className="w-full p-4 bg-slate-50 rounded-2xl border-none" />
                                    </div>
                                </div>
                                <div className="bg-slate-900 p-7 rounded-[2.5rem] grid grid-cols-2 gap-4 shadow-xl">
                                    <input type="number" name="start" placeholder="출발(km)" required className="bg-slate-800 text-white p-4 rounded-xl border-none font-bold placeholder:text-slate-600" />
                                    <input type="number" name="end" placeholder="도착(km)" required className="bg-slate-800 text-white p-4 rounded-xl border-none font-bold placeholder:text-slate-600" />
                                </div>
                                <button type="submit" className="w-full btn-gradient text-white py-5 rounded-[2rem] font-black text-lg shadow-xl shadow-blue-200">기록 완료</button>
                            </form>
                        </div>
                    )}

                    {/* 자원 관리 (스테프/보호사/어르신) */}
                    {activeTab === 'manage' && (
                        <div className="p-6 animate-in fade-in duration-500">
                            <div className="flex justify-between items-center mb-6">
                                <h2 className="text-2xl font-black">인원 관리</h2>
                                <button onClick={() => setShowAddForm(!showAddForm)} className={`w-12 h-12 rounded-2xl flex items-center justify-center transition-all ${showAddForm ? 'bg-slate-800 text-white rotate-45' : 'bg-white text-blue-600 card-shadow'}`}>
                                    <i className="fas fa-plus"></i>
                                </button>
                            </div>

                            <div className="flex bg-slate-200/50 p-1 rounded-2xl mb-6">
                                {['staffs', 'workers', 'elders'].map(tab => (
                                    <button key={tab} onClick={() => {setManageSubTab(tab); setShowAddForm(false);}} className={`flex-1 py-3 rounded-xl text-[11px] font-bold transition-all ${manageSubTab === tab ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-400'}`}>
                                        {tab === 'staffs' ? '스테프' : tab === 'workers' ? '보호사' : '어르신'}
                                    </button>
                                ))}
                            </div>

                            {showAddForm && (
                                <form onSubmit={handleAddPerson} className="bg-white p-6 rounded-[2.5rem] card-shadow border border-white mb-8 space-y-4 animate-in slide-in-from-top-5">
                                    <p className="text-[10px] font-black text-blue-600 uppercase text-center mb-2">{manageSubTab} 신규 등록</p>
                                    <div className="grid grid-cols-2 gap-3">
                                        <input name="name" placeholder="이름" required className="bg-slate-50 p-4 rounded-2xl border-none font-bold" />
                                        <select name="gender" className="bg-slate-50 p-4 rounded-2xl border-none font-bold">
                                            <option value="남">남성</option>
                                            <option value="여">여성</option>
                                        </select>
                                    </div>
                                    <input name="phone" placeholder="연락처 (- 포함)" required className="w-full bg-slate-50 p-4 rounded-2xl border-none font-bold" />
                                    <input name="birth" type="date" required className="w-full bg-slate-50 p-4 rounded-2xl border-none font-bold text-slate-400" />
                                    <input name="role" placeholder="직함/역할 (예: 요양보호사)" className="w-full bg-slate-50 p-4 rounded-2xl border-none font-bold" />
                                    <button className="w-full btn-gradient text-white py-4 rounded-2xl font-black">정보 저장하기</button>
                                </form>
                            )}

                            <div className="space-y-3">
                                {(manageSubTab === 'staffs' ? staffs : manageSubTab === 'workers' ? workers : elders).map((p, i) => (
                                    <div key={i} className="bg-white p-5 rounded-[2rem] flex justify-between items-center card-shadow border border-white">
                                        <div className="flex items-center gap-4">
                                            <div className="w-11 h-11 bg-slate-100 rounded-full flex items-center justify-center text-slate-400 font-bold text-xs uppercase">{p.name[0]}</div>
                                            <div>
                                                <p className="font-bold text-slate-800 text-sm">{p.name} <span className="text-[10px] font-normal text-slate-400">({p.gender})</span></p>
                                                <p className="text-[11px] text-blue-600 font-bold">{p.phone}</p>
                                            </div>
                                        </div>
                                        <a href={`tel:${p.phone}`} className="w-10 h-10 bg-emerald-50 text-emerald-600 rounded-xl flex items-center justify-center"><i className="fas fa-phone-alt"></i></a>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    <nav className="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-xl border-t border-slate-100 flex justify-around p-5 rounded-t-[2.5rem] z-50">
                        <button onClick={() => setActiveTab('home')} className={`text-xl ${activeTab === 'home' ? 'text-blue-600' : 'text-slate-300'}`}><i className="fas fa-home"></i></button>
                        <button onClick={() => setActiveTab('record')} className="bg-blue-600 text-white w-14 h-14 rounded-2xl flex items-center justify-center -translate-y-10 shadow-xl shadow-blue-200 active:scale-90 transition-transform"><i className="fas fa-plus text-xl"></i></button>
                        <button onClick={() => setActiveTab('manage')} className={`text-xl ${activeTab === 'manage' ? 'text-blue-600' : 'text-slate-300'}`}><i className="fas fa-users"></i></button>
                    </nav>

                    {toast.show && <div className="fixed bottom-28 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-full text-xs font-bold z-[100] animate-bounce shadow-2xl">{toast.msg}</div>}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
