<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>365 안심돌봄 Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@100;400;600;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; letter-spacing: -0.03em; }
        .glass-header { background: rgba(248, 250, 252, 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.04), 0 8px 10px -6px rgba(0, 0, 0, 0.04); }
        .nav-active { color: #2563eb; position: relative; }
        .nav-active::after { content: ''; position: absolute; bottom: -8px; width: 4px; height: 4px; background: #2563eb; border-radius: 50%; }
        .btn-gradient { background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%); }
        input, select { border: 1px solid #e2e8f0 !important; transition: all 0.2s; }
        input:focus, select:focus { border-color: #2563eb !important; ring: 2px; ring-color: #dbeafe; outline: none; }
        .tab-transition { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="bg-[#F8FAFC] text-slate-900 selection:bg-blue-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz1Dg2FV0eoRDBeiGUrlIRAcYf-lP4gvB6DZLNGOzurmUDNVpqDtDTeNt6KoejVdESo/exec";

        function CareSystemV12() {
            const [staffs, setStaffs] = useState(() => JSON.parse(localStorage.getItem('d12_staffs')) || []);
            const [workers, setWorkers] = useState(() => JSON.parse(localStorage.getItem('d12_workers')) || []);
            const [elders, setElders] = useState(() => JSON.parse(localStorage.getItem('d12_elders')) || []);
            const [logs, setLogs] = useState(() => JSON.parse(localStorage.getItem('d12_logs')) || []);
            const [activeTab, setActiveTab] = useState('home');
            const [toast, setToast] = useState({ show: false, msg: '' });
            const [isSyncing, setIsSyncing] = useState(false);

            useEffect(() => {
                localStorage.setItem('d12_staffs', JSON.stringify(staffs));
                localStorage.setItem('d12_workers', JSON.stringify(workers));
                localStorage.setItem('d12_elders', JSON.stringify(elders));
                localStorage.setItem('d12_logs', JSON.stringify(logs));
            }, [staffs, workers, elders, logs]);

            const showToast = (msg) => {
                setToast({ show: true, msg });
                setTimeout(() => setToast({ show: false }), 2500);
            };

            const syncToGoogle = async (data) => {
                if (!GOOGLE_SCRIPT_URL || GOOGLE_SCRIPT_URL.includes("URL을_입력")) return;
                setIsSyncing(true);
                try {
                    await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
                } catch (e) { console.error(e); }
                finally { setIsSyncing(false); }
            };

            const Home = () => (
                <div className="p-6 pb-36 animate-in fade-in duration-500">
                    <header className="flex justify-between items-end mb-8">
                        <div>
                            <p className="text-blue-600 font-black text-xs uppercase tracking-[0.2em] mb-1">Jeongeup Dasom</p>
                            <h2 className="text-3xl font-black tracking-tighter text-slate-900">365 안심돌봄</h2>
                        </div>
                        <div className="relative">
                            <div className={`w-3 h-3 rounded-full ${isSyncing ? 'bg-amber-400 animate-pulse' : 'bg-emerald-400'}`}></div>
                        </div>
                    </header>

                    <div className="grid grid-cols-1 gap-4 mb-8">
                        <div className="bg-white p-6 rounded-[2.5rem] card-shadow border border-white/60 flex items-center justify-between">
                            <div>
                                <p className="text-slate-400 text-xs font-bold mb-1 italic">Total Services</p>
                                <p className="text-4xl font-black text-slate-900">{logs.length}<span className="text-lg font-normal text-slate-300 ml-1 font-sans">pts</span></p>
                            </div>
                            <div className="w-14 h-14 bg-blue-50 rounded-2xl flex items-center justify-center text-blue-600">
                                <i className="fas fa-chart-line text-xl"></i>
                            </div>
                        </div>
                    </div>

                    <div className="grid grid-cols-2 gap-4 mb-8">
                        <div className="bg-gradient-to-br from-blue-600 to-blue-700 p-6 rounded-[2.5rem] shadow-lg shadow-blue-200 text-white">
                            <p className="opacity-70 text-[10px] font-bold uppercase tracking-widest mb-4">병원동행</p>
                            <p className="text-3xl font-black">{logs.filter(l=>l.type==='병원').length}</p>
                        </div>
                        <div className="bg-white p-6 rounded-[2.5rem] card-shadow border border-white text-slate-800">
                            <p className="text-slate-400 text-[10px] font-bold uppercase tracking-widest mb-4">인력이동</p>
                            <p className="text-3xl font-black">{logs.filter(l=>l.type==='이동').length}</p>
                        </div>
                    </div>

                    <div className="space-y-4">
                        <div className="flex justify-between items-center px-2">
                            <h3 className="text-sm font-black text-slate-800">최근 활동 로그</h3>
                            <button className="text-[10px] font-bold text-blue-600 uppercase">View All</button>
                        </div>
                        {logs.slice(0, 4).map((l, i) => (
                            <div key={i} className="bg-white/60 p-4 rounded-3xl flex justify-between items-center border border-white card-shadow">
                                <div className="flex items-center gap-4">
                                    <div className={`w-10 h-10 rounded-2xl flex items-center justify-center text-xs ${l.type==='병원'?'bg-blue-100 text-blue-600':'bg-slate-100 text-slate-600'}`}>
                                        <i className={`fas ${l.type==='병원'?'fa-hospital':'fa-car'}`}></i>
                                    </div>
                                    <div>
                                        <p className="text-sm font-bold text-slate-800">{l.targetName}</p>
                                        <p className="text-[10px] text-slate-400 font-medium">{l.date} · {l.provider}</p>
                                    </div>
                                </div>
                                <p className="text-xs font-black text-slate-600">+{l.dist}km</p>
                            </div>
                        ))}
                    </div>
                </div>
            );

            const RecordForm = () => {
                const [type, setType] = useState('병원');
                return (
                    <div className="p-6 pb-36 animate-in slide-in-from-bottom-10 duration-500">
                        <h2 className="text-2xl font-black mb-8 tracking-tighter">서비스 기록하기</h2>
                        <form onSubmit={async (e) => {
                            e.preventDefault();
                            const formData = new FormData(e.target);
                            const logData = {
                                sheetName: 'logs',
                                type: formData.get('type'),
                                date: formData.get('date'),
                                targetName: formData.get('targetName'),
                                provider: formData.get('provider'),
                                destination: formData.get('destination'),
                                purpose: formData.get('purpose') || '-',
                                dist: parseInt(formData.get('endDist')) - parseInt(formData.get('startDist'))
                            };
                            setLogs([logData, ...logs]);
                            await syncToGoogle(logData);
                            showToast("드라이브에 저장되었습니다.");
                            setActiveTab('home');
                        }} className="space-y-4">
                            <div className="flex bg-slate-200/50 p-1.5 rounded-[1.8rem] mb-6">
                                <button type="button" onClick={()=>setType('병원')} className={`flex-1 py-3.5 rounded-[1.4rem] text-sm font-bold transition-all ${type==='병원'?'bg-white text-blue-600 shadow-md scale-[1.02]':'text-slate-500'}`}>어르신 병원</button>
                                <button type="button" onClick={()=>setType('이동')} className={`flex-1 py-3.5 rounded-[1.4rem] text-sm font-bold transition-all ${type==='이동'?'bg-white text-slate-800 shadow-md scale-[1.02]':'text-slate-500'}`}>보호사 이동</button>
                                <input type="hidden" name="type" value={type} />
                            </div>

                            <div className="bg-white p-7 rounded-[2.5rem] card-shadow border border-white space-y-6">
                                <div className="space-y-1.5">
                                    <label className="text-[11px] font-black text-slate-400 ml-1 uppercase tracking-wider">수행 인력</label>
                                    <select name="provider" required className="w-full bg-slate-50 p-4 rounded-2xl font-bold text-slate-700 border-none appearance-none">
                                        <option value="">수행인력 선택</option>
                                        {staffs.map((s, i) => <option key={i} value={s.name}>{s.name} ({s.role})</option>)}
                                    </select>
                                </div>
                                <div className="space-y-1.5">
                                    <label className="text-[11px] font-black text-slate-400 ml-1 uppercase tracking-wider">대상자</label>
                                    <select name="targetName" required className="w-full bg-slate-50 p-4 rounded-2xl font-bold text-blue-600 border-none appearance-none">
                                        <option value="">대상 선택</option>
                                        {type==='병원' 
                                            ? elders.map((e, i) => <option key={i} value={e.name}>{e.name} ({e.birth})</option>)
                                            : workers.map((w, i) => <option key={i} value={w.name}>{w.name} ({w.birth})</option>)
                                        }
                                    </select>
                                </div>
                                <div className="grid grid-cols-2 gap-3">
                                    <div className="space-y-1.5">
                                        <label className="text-[11px] font-black text-slate-400 ml-1 uppercase">일자</label>
                                        <input name="date" type="date" required className="w-full bg-slate-50 p-4 rounded-2xl font-bold text-xs" />
                                    </div>
                                    <div className="space-y-1.5">
                                        <label className="text-[11px] font-black text-slate-400 ml-1 uppercase">목적지</label>
                                        <input name="destination" placeholder="방문지" required className="w-full bg-slate-50 p-4 rounded-2xl font-bold text-xs" />
                                    </div>
                                </div>
                            </div>

                            <div className="bg-slate-900 p-7 rounded-[2.5rem] shadow-2xl space-y-5">
                                <p className="text-[11px] font-black text-slate-500 uppercase tracking-[0.2em] ml-1">Car Mileage (km)</p>
                                <div className="grid grid-cols-2 gap-4">
                                    <input name="startDist" type="number" placeholder="출발 거리" required className="bg-slate-800 text-white p-4 rounded-2xl font-bold border-none placeholder:text-slate-600 focus:ring-1 focus:ring-blue-500" />
                                    <input name="endDist" type="number" placeholder="도착 거리" required className="bg-slate-800 text-white p-4 rounded-2xl font-bold border-none placeholder:text-slate-600 focus:ring-1 focus:ring-blue-500" />
                                </div>
                            </div>

                            <button type="submit" className="w-full btn-gradient text-white py-5 rounded-[2.2rem] font-black text-lg shadow-xl shadow-blue-100 active:scale-[0.98] transition-transform">
                                실적 저장하기
                            </button>
                        </form>
                    </div>
                );
            };

            const Manage = () => {
                const [mTab, setMTab] = useState('staff');
                const [showAdd, setShowAdd] = useState(false);

                return (
                    <div className="p-6 pb-36 animate-in slide-in-from-right-10 duration-500">
                        <div className="flex justify-between items-center mb-8">
                            <h2 className="text-2xl font-black tracking-tighter text-slate-800">자원 관리</h2>
                            <button onClick={()=>setShowAdd(!showAdd)} className={`w-12 h-12 rounded-2xl flex items-center justify-center transition-all ${showAdd ? 'bg-slate-800 text-white rotate-45' : 'bg-white text-blue-600 card-shadow'}`}>
                                <i className="fas fa-plus"></i>
                            </button>
                        </div>
                        
                        <div className="flex bg-slate-200/50 p-1 rounded-2xl mb-6 gap-1">
                            {['staff', 'worker', 'elder'].map(t => (
                                <button key={t} onClick={()=>setMTab(t)} className={`flex-1 py-3 px-1 rounded-xl text-[10px] font-black tracking-tighter ${mTab===t?'bg-white text-blue-600 shadow-sm':'text-slate-400'}`}>
                                    {t==='staff'?'수행인력':t==='worker'?'요양보호사':'어르신'}
                                </button>
                            ))}
                        </div>

                        {showAdd && (
                            <div className="bg-white p-7 rounded-[2.5rem] card-shadow border border-white mb-8 animate-in zoom-in-95 duration-300">
                                <form onSubmit={async (e) => {
                                    e.preventDefault();
                                    const formData = new FormData(e.target);
                                    const infoData = {
                                        sheetName: mTab === 'staff' ? 'staffs' : mTab === 'worker' ? 'workers' : 'elders',
                                        name: formData.get('pName'),
                                        birth: formData.get('pBirth'),
                                        gender: formData.get('pGender'),
                                        phone: formData.get('pPhone'),
                                        role: formData.get('pRole') || 'N/A'
                                    };
                                    if(mTab==='staff') setStaffs([infoData, ...staffs]);
                                    else if(mTab==='worker') setWorkers([infoData, ...workers]);
                                    else setElders([infoData, ...elders]);
                                    await syncToGoogle(infoData);
                                    e.target.reset();
                                    setShowAdd(false);
                                    showToast("등록되었습니다.");
                                }} className="space-y-4">
                                    <div className="grid grid-cols-2 gap-3">
                                        <input name="pName" placeholder="성함" required className="bg-slate-50 p-4 rounded-2xl border-none font-bold" />
                                        <select name="pGender" required className="bg-slate-50 p-4 rounded-2xl border-none font-bold text-slate-500">
                                            <option value="">성별</option>
                                            <option value="남">남성</option>
                                            <option value="여">여성</option>
                                        </select>
                                    </div>
                                    <input name="pPhone" type="tel" placeholder="연락처 (- 포함)" required className="w-full bg-slate-50 p-4 rounded-2xl border-none font-bold" />
                                    <input name="pBirth" type="date" required className="w-full bg-slate-50 p-4 rounded-2xl border-none font-bold text-slate-400" />
                                    {mTab === 'staff' && <input name="pRole" placeholder="직위 (예: 팀장)" required className="w-full bg-slate-50 p-4 rounded-2xl border-none font-bold" />}
                                    <button className="w-full btn-gradient text-white py-4 rounded-2xl font-black shadow-lg shadow-blue-100">새로운 {mTab==='staff'?'인력':'대상'} 추가</button>
                                </form>
                            </div>
                        )}

                        <div className="space-y-3">
                            {(mTab==='staff'?staffs:mTab==='worker'?workers:elders).map((item, i) => (
                                <div key={i} className="bg-white p-5 rounded-[2rem] flex justify-between items-center card-shadow border border-white transition-all active:scale-[0.98]">
                                    <div className="flex items-center gap-4">
                                        <div className="w-12 h-12 bg-slate-50 rounded-full flex items-center justify-center text-slate-300 font-black">
                                            {item.name[0]}
                                        </div>
                                        <div>
                                            <p className="font-black text-slate-800">{item.name} <span className="text-[10px] font-normal text-slate-400 ml-1">({item.gender})</span></p>
                                            <p className="text-[11px] text-blue-600 font-bold mt-0.5">{item.phone}</p>
                                        </div>
                                    </div>
                                    <div className="flex gap-2">
                                        <a href={`tel:${item.phone}`} className="w-10 h-10 bg-emerald-50 text-emerald-600 rounded-xl flex items-center justify-center text-sm">
                                            <i className="fas fa-phone"></i>
                                        </a>
                                        <button onClick={()=>{if(confirm("삭제할까요?")){
                                            if(mTab==='staff') setStaffs(staffs.filter((_, idx)=>idx!==i));
                                            else if(mTab==='worker') setWorkers(workers.filter((_, idx)=>idx!==i));
                                            else setElders(elders.filter((_, idx)=>idx!==i));
                                        }}} className="w-10 h-10 bg-rose-50 text-rose-500 rounded-xl flex items-center justify-center text-sm">
                                            <i className="fas fa-trash-alt"></i>
                                        </button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            };

            return (
                <div className="max-w-md mx-auto min-h-screen bg-[#F8FAFC] relative overflow-x-hidden">
                    <main className="tab-transition">
                        {activeTab === 'home' && <Home />}
                        {activeTab === 'record' && <RecordForm />}
                        {activeTab === 'manage' && <Manage />}
                    </main>

                    <nav className="fixed bottom-0 left-0 right-0 glass-header border-t border-slate-100 flex justify-around items-center bottom-nav-safe z-50 rounded-t-[2.5rem] shadow-[0_-10px_40px_rgba(0,0,0,0.04)] px-8">
                        <button onClick={()=>setActiveTab('home')} className={`py-7 flex-1 flex flex-col items-center gap-1 transition-all ${activeTab==='home'?'nav-active scale-110':'text-slate-300'}`}>
                            <i className="fas fa-house-chimney text-lg"></i>
                            <span className="text-[9px] font-black uppercase">Home</span>
                        </button>
                        <button onClick={()=>setActiveTab('record')} className="flex-1 flex flex-col items-center -translate-y-10 group">
                            <div className="btn-gradient text-white w-16 h-16 rounded-[1.8rem] shadow-2xl shadow-blue-300 flex items-center justify-center text-2xl transition-transform group-active:scale-90">
                                <i className="fas fa-plus"></i>
                            </div>
                        </button>
                        <button onClick={()=>setActiveTab('manage')} className={`py-7 flex-1 flex flex-col items-center gap-1 transition-all ${activeTab==='manage'?'nav-active scale-110':'text-slate-300'}`}>
                            <i className="fas fa-address-book text-lg"></i>
                            <span className="text-[9px] font-black uppercase">Data</span>
                        </button>
                    </nav>

                    {toast.show && (
                        <div className="fixed bottom-32 left-1/2 -translate-x-1/2 bg-slate-900/95 backdrop-blur-md text-white px-8 py-3.5 rounded-full text-[11px] font-bold z-[100] animate-in slide-in-from-bottom-5 duration-300 shadow-2xl border border-white/10">
                            {toast.msg}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<CareSystemV12 />);
    </script>
</body>
</html>
